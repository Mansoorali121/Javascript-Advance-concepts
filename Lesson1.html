<html>
<head>
<h1> JavaScript Print Statement With Sum of 2 Variables</h1>
<p id="demo"></p>
</head>
<body>
    <script>
        let x = 10;
        let y = 20;
        let z = x+y;
        document.getElementById("demo").innerHTML = "The sum of X and Y is " + z;

        
    </script>
</body>

</html>
