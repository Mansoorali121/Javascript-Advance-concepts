<html>
  <body>
    <h1>JavaScript Return Values:</h1>
    <p>A function can return any type of value (not only numbers).</p>
    <p id="demo"></p>

    <script>
        function name(firstName,lastName){
            
            return  firstName + " " + lastName;
        }
        let fullname = name("Mansoor","Ali");
        document.getElementById("demo").innerHTML = fullname;

    </script>
  </body>
</html>
