<html>
  <body>
    <h1>JavaScript Callbacks</h1>
    <p>
      Callbacks are the function which passes inside another functiona as
      arguemement and then called later
    </p>
    <p id="demo"></p>
    <p id="demo1"></p>
    <script>
      function greet(name, callback) {
        document.getElementById("demo").innerHTML = "Hello " + name;
        callback();
      }
      function sayBye() {
        document.getElementById("demo1").innerHTML = "Bye..!";
      }
      greet("Ali", sayBye);
    </script>
  </body>
</html>

<html>
  <body>
    <h1>Callback With Calculation</h1>
    <p id="demo2"></p>
    <script>
      function calculate(a, b, callBack) {
        let result = a + b;
        callBack(result);
      }
      function display(result) {
        document.getElementById("demo2").innerHTML = "The result is " + result;
      }
      calculate(2, 3, display);
    </script>
  </body>
</html>

<html>
  <body>
    <h1>Anonymous Callback</h1>
    <p>To use Callback inline (Anonymous Function)</p>
    <p id="demo3"></p>
    <p id="demo4"></p>
    <script>
      function greeting(name, callbacckk) {
        document.getElementById("demo3").innerHTML = "Hello " + name;
        callbacckk();
      }
      greeting("sara", function () {
        document.getElementById("demo4").innerHTML = "Welcome..!";
      });
    </script>
  </body>
</html>
