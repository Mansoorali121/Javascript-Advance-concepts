<html>
  <body>
    <h1>Global Scope</h1>
    <p id="demo"></p>

    <script>
      let name = "Mansoor";

      function PersonName() {
        return name;
      }
      document.getElementById("demo").innerHTML =
        "I am dispalying Name " + PersonName();
    </script>
  </body>
</html>

<html>
  <body>
    <h1>Function Scope</h1>
    <p id="demo1"></p>

    <script>
      function PersonAge() {
        return (age = 40);
      }
      document.getElementById("demo1").innerHTML =
        "I am dispalying Function Scope " + PersonAge();
    </script>
  </body>
</html>

<html>
  <body>
    <h1>Block Scope</h1>
    <p id="demo2"></p>
    <script>
      {
        let text = "I am Block Scope text";
        function Blockscope() {
          return text;
        }
        document.getElementById("demo2").innerHTML =
          "I am Block Scope <br> " + Blockscope();
      }
    </script>
  </body>
</html>

<html>
  <body>
    <h1>JavaScript Code Blocks</h1>
    <h2>Curly Braces</h2>
    <p>
      A code block or block statement is a group of statements enclosed within
      curly braces { }.
    </p>
    <p>
      Code blocks are important for controlling the flow of execution and
      defining variable scope within a JavaScript program.
    </p>
    <p id="demo4"></p>
    <script>
      {
        let text = " ";
        const age = 24;
        if (age > 20) {
          text = "You are Mature ";
        } else {
          text = "You are Young ";
        }
        document.getElementById("demo4").innerHTML = text;
      }
    </script>
  </body>
</html>
