<html>
    <body>
        <p> Global Scope </p>
        <p id="demo"></p>

        <script>
            let name = "Mansoor";

            function PersonName (){
                return name;
            }
            document.getElementById("demo").innerHTML = "I am dispalying Name "+ PersonName();
        </script>

    </body>
</html>
