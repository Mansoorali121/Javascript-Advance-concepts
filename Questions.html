<h2>With Memoization</h2>
<button onclick="calculateMemo()">Calculate Square</button>
<p id="output2"></p>

<script>
function memoizedSquare() {
  let cache = {};

  return function(n) {
    if (n in cache) {
      console.log("From cache ✅");
      return cache[n];
    } else {
      console.log("Calculating...");
      let result = n * n;
      cache[n] = result;
      return result;
    }
  };
}

const square = memoizedSquare();

  let result = square(5);
  document.getElementById("output2").innerHTML = result;
}
</script>

</body>
